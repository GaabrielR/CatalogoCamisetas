{% extends "base.html" %}

{% block content %}
<form method="POST">
    <input name="username" class="form-control mb-2" placeholder="Usuário">
    <input name="password" type="password" class="form-control mb-2" placeholder="Senha">
    <button class="btn btn-primary">Entrar</button>

    <div class="mt-3 text-center">
        <a href="/register">Não tem conta? Criar conta</a>
    </div>
</form>
{% endblock %}
